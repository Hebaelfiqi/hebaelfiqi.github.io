name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'Hebaelfiqi/hebaelfiqi.github.io'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy (attempt 1)
        id: d1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.d1.outcome == 'failure'
        run: sleep 90

      - name: Deploy (attempt 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before final retry
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 180

      - name: Deploy (attempt 3)
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
